<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="0">
  <title>PlanYourTrip — Site en construction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      padding: 24px;
    }
    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .emoji { font-size: 72px; margin-bottom: 24px; display: block; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: #fbbf24;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #0f172a;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .download-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(251, 191, 36, 0.3);
    }
    .download-btn:active {
      transform: scale(0.98);
    }
    .download-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }
    .info {
      margin-top: 24px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }
    .progress-bar {
      margin-top: 32px;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
    }
    @keyframes progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🚧</span>
    <h1>PlanYourTrip</h1>
    <p class="subtitle">Notre nouveau site web arrive bientot !<br>En attendant, l'application mobile est disponible.</p>
    <div class="badge">Site en construction</div>

    <a href="/downloads/planyourtrip.apk" class="download-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.523 0H6.477L0 12l6.477 12h11.046L24 12 17.523 0zm-5.523 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/>
      </svg>
      Telecharger pour Android
    </a>

    <p class="info">
      APK Android · Autoriser l'installation depuis des sources inconnues<br>
      dans les parametres de votre telephone.
    </p>

    <div class="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>
  </div>
</body>
</html>
