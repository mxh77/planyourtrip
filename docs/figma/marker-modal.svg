<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#1a1a26"/>

  <!-- Backdrop -->
  <rect x="0" y="0" width="390" height="844" fill="rgba(0,0,0,0.55)"/>

  <!-- Carte floutée simulée -->
  <image href="data:image/svg+xml,%3Csvg width='390' height='844' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='390' height='844' fill='%232d4a3a'/%3E%3C/svg%3E" x="0" y="0" width="390" height="844" opacity="0.3"/>

  <!-- Modal card (bottom card style) -->
  <path d="M0 240 Q0 220 20 220 L370 220 Q390 220 390 240 L390 844 L0 844 Z" fill="#1a1a26"/>

  <!-- Image d'en-tête -->
  <defs>
    <clipPath id="headerClip">
      <rect x="0" y="220" width="390" height="140" rx="0"/>
    </clipPath>
  </defs>
  <rect x="0" y="220" width="390" height="140" fill="#1e3a2f"/>
  <!-- Montagnes stylisées -->
  <polygon points="0,360 60,260 120,320 180,240 240,310 300,250 390,300 390,360" fill="#2d5a3e" opacity="0.6"/>
  <polygon points="0,360 40,290 100,350 160,270 220,330 280,280 340,320 390,290 390,360" fill="#3a7a4e" opacity="0.4"/>
  <polygon points="0,360 80,310 150,360 200,300 260,350 320,290 390,340 390,360" fill="#4a9a5e" opacity="0.25"/>
  <!-- Soleil -->
  <circle cx="310" cy="270" r="24" fill="#fbbf24" opacity="0.6"/>
  <circle cx="310" cy="270" r="16" fill="#fcd34d" opacity="0.4"/>
  <!-- Nuages -->
  <rect x="60" y="278" width="60" height="8" rx="4" fill="#fff" opacity="0.15"/>
  <rect x="80" y="272" width="40" height="6" rx="3" fill="#fff" opacity="0.12"/>
  <rect x="220" y="285" width="50" height="6" rx="3" fill="#fff" opacity="0.1"/>

  <!-- Badge photo -->
  <rect x="12" y="232" width="60" height="22" rx="6" fill="rgba(0,0,0,0.5)"/>
  <text x="42" y="247" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9" font-family="system-ui">📷 1/3</text>

  <!-- Close button -->
  <rect x="342" y="232" width="36" height="36" rx="18" fill="rgba(0,0,0,0.5)"/>
  <text x="360" y="256" text-anchor="middle" fill="#fff" font-size="18" font-weight="600">✕</text>

  <!-- Title section -->
  <rect x="0" y="360" width="390" height="64" fill="#1a1a26"/>

  <rect x="20" y="368" width="44" height="44" rx="12" fill="rgba(34,197,94,0.12)"/>
  <text x="42" y="398" text-anchor="middle" font-size="22">🏕️</text>

  <text x="76" y="390" fill="#fff" font-size="18" font-weight="700" font-family="system-ui">Camping Wyler</text>
  <text x="76" y="406" fill="rgba(255,255,255,0.4)" font-size="11" font-family="system-ui">Camping · Grindelwald, Suisse</text>

  <!-- Rating badge -->
  <rect x="290" y="372" width="80" height="24" rx="6" fill="rgba(245,158,11,0.1)"/>
  <text x="310" y="389" fill="#fbbf24" font-size="10">⭐</text>
  <text x="324" y="389" fill="#fbbf24" font-size="12" font-weight="700" font-family="system-ui">4.4</text>

  <!-- Divider -->
  <rect x="20" y="432" width="350" height="1" fill="rgba(255,255,255,0.06)"/>

  <!-- Actions row 1 : Google Maps + Site web -->
  <rect x="20" y="446" width="170" height="42" rx="10" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="38" y="472" font-size="14">📍</text>
  <text x="58" y="472" fill="#93c5fd" font-size="12" font-weight="600" font-family="system-ui">Google Maps</text>

  <rect x="200" y="446" width="170" height="42" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="218" y="472" font-size="14">🔗</text>
  <text x="238" y="472" fill="rgba(255,255,255,0.7)" font-size="12" font-weight="600" font-family="system-ui">Site web</text>

  <!-- Actions stacked -->
  <!-- Action 1 : Sélectionner pour l'étape -->
  <rect x="20" y="498" width="350" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="36" y="526" font-size="16">✅</text>
  <text x="64" y="526" fill="#fff" font-size="14" font-weight="600" font-family="system-ui">Sélectionner pour l'étape</text>
  <text x="346" y="526" fill="rgba(255,255,255,0.2)" font-size="12">›</text>

  <!-- Action 2 : Ajouter aux favoris -->
  <rect x="20" y="550" width="350" height="46" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="36" y="578" font-size="16">⭐</text>
  <text x="64" y="578" fill="#fff" font-size="14" font-weight="600" font-family="system-ui">Ajouter aux favoris</text>
  <text x="346" y="578" fill="rgba(255,255,255,0.2)" font-size="12">›</text>

  <!-- Action 3 : Trajet vers ce camping -->
  <rect x="20" y="602" width="350" height="46" rx="10" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.1)" stroke-width="1"/>
  <text x="36" y="630" font-size="16">🏕️</text>
  <text x="64" y="630" fill="#4ade80" font-size="14" font-weight="600" font-family="system-ui">Trajet vers ce camping</text>
  <text x="346" y="630" fill="rgba(255,255,255,0.2)" font-size="12">›</text>

  <!-- Action 4 : Vérifier les réservations -->
  <rect x="20" y="654" width="350" height="46" rx="10" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.1)" stroke-width="1"/>
  <text x="36" y="682" font-size="16">📅</text>
  <text x="64" y="682" fill="#c4b5fd" font-size="14" font-weight="600" font-family="system-ui">Vérifier les réservations</text>
  <text x="346" y="682" fill="rgba(255,255,255,0.2)" font-size="12">›</text>

  <!-- Footer -->
  <rect x="0" y="790" width="390" height="54" fill="#1a1a26" opacity="0.95"/>
  <text x="195" y="812" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="system-ui">Écran 5/5 • Marker Modal</text>
  <text x="195" y="828" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" font-family="system-ui">Inspiré du modal desktop roadtrip-planner</text>
</svg>