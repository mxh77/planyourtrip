  <text x="195" y="812" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="system-ui">Écran 5/5 • Marker Modal (camping)</text>
  <text x="195" y="828" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9" font-family="system-ui">Modal overlay · clic sur marqueur carte</text>
