<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="40%" stop-color="#2d4a3a"/>
      <stop offset="100%" stop-color="#1a3a4a"/>
    </linearGradient>
    <linearGradient id="sheetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a26"/>
      <stop offset="100%" stop-color="#1a1a26"/>
    </linearGradient>
  </defs>

  <!-- Background map -->
  <rect width="390" height="844" fill="url(#mapBg)"/>

  <!-- Route line -->
  <line x1="195" y1="180" x2="195" y2="520" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Markers -->
  <circle cx="255" cy="520" r="14" fill="#f59e0b" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="255" y="525" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">1</text>

  <circle cx="180" cy="460" r="14" fill="#3b82f6" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="180" y="465" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">2</text>

  <circle cx="220" cy="390" r="14" fill="#22c55e" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="220" y="395" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">3</text>

  <circle cx="160" cy="330" r="14" fill="#a855f7" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="160" y="335" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">4</text>

  <circle cx="240" cy="270" r="14" fill="#ef4444" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="240" y="275" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">5</text>

  <circle cx="200" cy="210" r="14" fill="#14b8a6" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="200" y="215" text-anchor="middle" fill="#fff" font-size="10" font-weight="700" font-family="system-ui">6</text>

  <!-- Active step label -->
  <rect x="98" y="550" width="194" height="26" rx="8" fill="rgba(0,0,0,0.6)"/>
  <circle cx="112" cy="563" r="4" fill="#f59e0b"/>
  <text x="122" y="568" fill="rgba(255,255,255,0.7)" font-size="11" font-family="system-ui">Étape active : Dole du Jura</text>

  <!-- Header -->
  <rect x="12" y="48" width="36" height="36" rx="18" fill="rgba(20,20,30,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="30" y="72" text-anchor="middle" fill="#fff" font-size="16">←</text>
  <rect x="152" y="52" width="86" height="28" rx="14" fill="rgba(20,20,30,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="195" y="71" text-anchor="middle" fill="#fff" font-size="13" font-weight="600" font-family="system-ui">Europe</text>
  <rect x="342" y="48" width="36" height="36" rx="18" fill="rgba(20,20,30,0.7)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="360" y="72" text-anchor="middle" fill="#fff" font-size="16">☰</text>

  <!-- ===== Search row: input + zone button on same line ===== -->
  <rect x="12" y="96" width="278" height="38" rx="12" fill="rgba(20,20,30,0.85)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="24" y="120" fill="rgba(255,255,255,0.3)" font-size="13" font-family="system-ui">Rechercher un lieu…</text>

  <!-- Zone button -->
  <rect x="298" y="96" width="80" height="38" rx="10" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="338" y="119" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600" font-family="system-ui">🔍 Zone</text>

  <!-- Overlay buttons -->
  <rect x="342" y="320" width="38" height="38" rx="19" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="361" y="345" text-anchor="middle" font-size="16">🏕️</text>
  <rect x="342" y="366" width="38" height="38" rx="19" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="361" y="391" text-anchor="middle" font-size="16">🥾</text>
  <rect x="342" y="412" width="38" height="38" rx="19" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="361" y="437" text-anchor="middle" font-size="16">📍</text>
  <rect x="342" y="458" width="38" height="38" rx="19" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="361" y="483" text-anchor="middle" font-size="16">🅿️</text>

  <!-- Bottom sheet - collapsed -->
  <rect x="0" y="595" width="390" height="249" fill="#1a1a26"/>
  <path d="M0 615 Q0 595 20 595 L370 595 Q390 595 390 615 L390 844 L0 844 Z" fill="#1a1a26"/>
  <!-- Handle -->
  <rect x="177" y="601" width="36" height="4" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Expand button -->
  <rect x="358" y="598" width="24" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <text x="370" y="614" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">☰</text>

  <!-- Current step (collapsed) -->
  <circle cx="36" cy="638" r="14" fill="#3b82f6"/>
  <text x="36" y="643" text-anchor="middle" fill="#fff" font-size="11" font-weight="700" font-family="system-ui">2</text>
  <text x="62" y="640" fill="#fff" font-size="14" font-weight="600" font-family="system-ui">Dole du Jura</text>
  <text x="62" y="656" fill="rgba(255,255,255,0.45)" font-size="11" font-family="system-ui">1 nuit · 31 juil. → 01 août · 432 km</text>
  <rect x="310" y="628" width="60" height="22" rx="6" fill="rgba(34,197,94,0.15)"/>
  <text x="340" y="643" text-anchor="middle" fill="#4ade80" font-size="10" font-family="system-ui">🏕️ ✅</text>

  <!-- Full sheet preview hint -->
  <rect x="16" y="676" width="358" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="24" y="700" fill="rgba(255,255,255,0.4)" font-size="11" font-family="system-ui">⤴ Glissez vers le haut pour voir toutes les étapes</text>

  <!-- Step list preview dots -->
  <rect x="176" y="632" width="34" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="176" y="648" width="34" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="176" y="664" width="22" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>

  <!-- Footer annotation -->
  <rect x="0" y="790" width="390" height="54" fill="#1a1a26" opacity="0.95"/>
  <text x="195" y="812" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" font-family="system-ui">Écran 3/3 • RoadtripDetail — Recherche + Zone sur une ligne</text>
  <text x="195" y="828" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="system-ui">↕ Glisser pour liste • Overlays à droite • Barre + bouton côte à côte</text>
</svg>
