name: Feature Dev Agent
run-name: "Feature Dev Agent - Issue #${{ github.event.inputs.issue_number || github.event.issue.number }}"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Numéro de l'issue GitHub"
        required: false
        type: string
      ai_model:
        description: "Modèle IA à utiliser"
        required: false
        type: string
        default: deepseek-v4-flash
      feedback:
        description: "Feedback de correction (retour depuis code review ou QA)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  issues: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: feature-dev-agent-${{ github.event.issue.number || github.event.inputs.issue_number || github.run_id }}
  cancel-in-progress: false

jobs:
  feature-dev-agent:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout dev-agents-core
        uses: actions/checkout@v4
        with:
          repository: mxh77/dev-agents-core
          path: dev-agents-core
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check environment
        run: |
          echo "Node: $(node -v || echo missing)"
          echo "Python: $(python3 --version || echo missing)"
          echo "jq: $(jq --version || echo missing)"
          echo "Git: $(git --version || echo missing)"

      - name: Configure git
        run: |
          git config user.name "feature-dev-agent"
          git config user.email "feature-dev-agent@local"

      - name: Checkout spec branch (single PR strategy)
        id: branch_setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          fi
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV

          BRANCH_NAME="branch_issue_${ISSUE_NUMBER}"
          git fetch origin
          git checkout "$BRANCH_NAME" 2>/dev/null || git checkout -b "$BRANCH_NAME" "origin/$BRANCH_NAME" 2>/dev/null || git checkout -b "$BRANCH_NAME"
          git pull origin "$BRANCH_NAME" || true
          echo "WORK_BRANCH=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: ${{ inputs.ai_model || 'deepseek-v4-flash' }}
          FEEDBACK: ${{ inputs.feedback || '' }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 dev-agents-core/tools/feature_dev_agent.py

      - name: Commit and push to branch
        run: |
          # Exclure dev-agents-core du commit (checkout temporaire, ne doit pas être versionné)
          git rm -r --cached dev-agents-core 2>/dev/null || true
          echo "dev-agents-core/" >> .gitignore
          git add -A
          git commit -m "feature-dev-agent: implémentation issue #${ISSUE_NUMBER}" || echo "Rien à commiter"
          git push origin "$WORK_BRANCH" --force-with-lease

      - name: Update or create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${WORK_BRANCH}" \
            | jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "✅ PR existante #$EXISTING_PR — code ajouté sur la branche (aucune action PR nécessaire)"
          else
            echo "Création d'une nouvelle PR sur $WORK_BRANCH"
            PR_BODY="$(cat .ai/pr_body.md 2>/dev/null || echo 'Implémentation feature-dev-agent')"
            jq -n \
              --arg title "feature-dev-agent: implémentation issue #${ISSUE_NUMBER}" \
              --arg head "$WORK_BRANCH" \
              --arg base "master" \
              --arg body "$PR_BODY" \
              '{title:$title, head:$head, base:$base, body:$body}' > pr.json
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pulls" \
              -d @pr.json | jq '{number, html_url}'
          fi
