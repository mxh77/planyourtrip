name: QA Fix Agent
run-name: "QA Fix - PR #${{ github.event.inputs.pr_number || inputs.pr_number }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numéro de la PR"
        required: true
        type: string
      bug_description:
        description: "Description du bug signalé"
        required: true
        type: string
      bug_category:
        description: "Catégorie du bug"
        required: false
        type: choice
        default: missing_feature
        options:
          - missing_feature
          - incorrect_behavior
          - ui_issue
          - performance
          - other
      ai_model:
        description: "Modèle IA à utiliser"
        required: false
        type: choice
        default: claude-sonnet-4-6
        options:
          - claude-sonnet-4-6
          - gpt-4.1
          - deepseek-v4-flash
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      bug_description:
        required: true
        type: string
      bug_category:
        required: false
        type: string
        default: missing_feature
      ai_model:
        required: false
        type: string
        default: claude-sonnet-4-6
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      DEEPSEEK_API_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qa-fix:
    runs-on: [self-hosted]

    steps:
      - name: Nettoyer répertoires parasites
        run: rm -rf dev-agents-core || true

      - name: Récupérer la branche de la PR
        id: get-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_INFO=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}")
          BRANCH=$(echo "$PR_INFO" | jq -r '.head.ref')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Branche PR : $BRANCH"

      - name: Checkout de la branche PR
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-branch.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer git
        run: |
          git config user.name "qa-fix-agent"
          git config user.email "qa-fix-agent@planyourtrip.app"

      - name: Lancer l'agent QA fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: ${{ inputs.ai_model }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BUG_DESCRIPTION: ${{ inputs.bug_description }}
          BUG_CATEGORY: ${{ inputs.bug_category }}
        run: |
          python3 .github/agents/qa_fix_agent.py

      - name: Commiter et pousser les corrections
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Aucune modification à commiter."
          else
            git commit -m "fix(qa): correction signalée via QA agent — PR #${{ inputs.pr_number }}"
            git push origin "${{ steps.get-branch.outputs.branch }}"
          fi
