name: Fix PR Reviews (Reusable)
run-name: "Fix PR Reviews - PR #${{ github.event.inputs.pr_number || inputs.pr_number }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numéro de la PR à corriger"
        required: true
        type: string
      ai_model:
        description: "Modèle IA à utiliser"
        required: false
        type: choice
        default: deepseek-v4-flash
        options:
          - deepseek-v4-flash
          - claude-sonnet-4-6
          - gpt-4.1
      issues_to_fix:
        description: "Problèmes à cibler (JSON, optionnel)"
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      ai_model:
        required: false
        type: string
        default: deepseek-v4-flash
      issues_to_fix:
        required: false
        type: string
        default: ''
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
      DEEPSEEK_API_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  fix-pr-reviews:
    runs-on: [self-hosted]

    steps:
      - name: Nettoyer répertoires parasites
        run: rm -rf dev-agents-core .git/modules/dev-agents-core || true

      - name: Récupérer la branche de la PR
        id: get-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_INFO=$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}")
          BRANCH=$(echo "$PR_INFO" | jq -r '.head.ref')
          PR_STATE=$(echo "$PR_INFO" | jq -r '.state')
          if [ "$PR_STATE" != "open" ]; then
            echo "La PR #${{ inputs.pr_number }} n'est pas ouverte (état : $PR_STATE)"
            exit 1
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Branche PR : $BRANCH"

      - name: Checkout de la branche PR
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-branch.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Récupérer l'agent depuis master
        run: |
          git fetch origin master
          git show origin/master:.github/agents/fix_reviews_agent.py > /tmp/fix_reviews_agent.py
          echo "[debug] Commit master utilisé : $(git rev-parse origin/master)"

      - name: Configurer git
        run: |
          git config user.name "fix-reviews-agent"
          git config user.email "fix-reviews-agent@monpetitroadtrip.app"

      - name: Lancer l'agent de correction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: ${{ inputs.ai_model }}
          ISSUES_TO_FIX: ${{ inputs.issues_to_fix }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          python3 /tmp/fix_reviews_agent.py

      - name: Commiter et pousser les corrections
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Aucune modification à commiter."
          else
            git commit -m "fix(reviews): corrections automatiques via fix-reviews-agent"
            git push origin "${{ steps.get-branch.outputs.branch }}"
          fi

      - name: Poster un commentaire sur la PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=""
          if [ -f ".ai/fix_reviews_summary.md" ]; then
            SUMMARY=$(cat .ai/fix_reviews_summary.md)
          fi

          if [ -n "$SUMMARY" ]; then
            BODY="## Fix Reviews Agent\n\nLes corrections ont été appliquées automatiquement sur cette PR.\n\n### Corrections effectuées\n\n${SUMMARY}\n\n---\n> Relancez les code reviews pour vérifier que les problèmes ont été résolus."
          else
            BODY="## Fix Reviews Agent\n\nAucune correction nécessaire - aucun problème bloquant détecté dans les rapports de review."
          fi

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$(printf '%b' "$BODY")" '{"body":$body}')" || true